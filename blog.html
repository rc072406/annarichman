<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Anna Richman</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFDAC5; 
            font-family: 'Inter', sans-serif;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- LOADING SCREEN --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #FFDAC5;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: preloaderFadeOut 0.8s forwards 5.5s !important;
        }

        .loader-logo-container {
            z-index: 10001;
            pointer-events: none;
        }

        .lemonade-fill {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 0%;
            background-color: rgba(255, 192, 203, 0.7) !important;
            z-index: 10000;
            animation: fillUp 5s ease-in-out forwards 0.3s;
        }

        .lemon-slice {
    position: absolute;
    width: 120px;
    height: 60px; 
   
    background: linear-gradient(to bottom, #fbdc33 0%, #f9d71c 100%); 
    border-radius: 120px 120px 0 0; 
    
    border: 5px solid #fffdf0; 
    border-bottom: 2px solid #f9d71c;
    z-index: 10001;
    pointer-events: none;
    top: -100px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    overflow: hidden;
    
    box-shadow: 0 8px 15px rgba(0,0,0,0.1), inset 0 -2px 5px rgba(0,0,0,0.05);
   
background: radial-gradient(circle at 50% 100%, #fff9c4 20%, #f9d71c 100%);
}

.lemon-slice::after {
    content: '';
    position: absolute;
    width: 110px; 
    height: 110px;
    
    bottom: -55px; 
    left: 50%;
    transform: translateX(-50%);
    border-radius: 50%;
    
    
    background: conic-gradient(
        from -90deg,            /* Start from the left horizontal */
        #fce862 0deg 40deg,     /* Wedge 1 */
        #fffdf0 40deg 45deg,    /* Line 1 */
        #fce862 45deg 85deg,    /* Wedge 2 */
        #fffdf0 85deg 90deg,    /* Line 2 (Center line) */
        #fce862 90deg 130deg,   /* Wedge 3 */
        #fffdf0 130deg 135deg,  /* Line 3 */
        #fce862 135deg 175deg,  /* Wedge 4 */
        #fffdf0 175deg 180deg,  /* End Line */
        transparent 180deg      /* Hide the bottom half */
    );
}


.lemon-slice::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 20px;
    width: 30px;
    height: 10px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    filter: blur(2px);
    z-index: 10002;
    transform: rotate(-20deg);
}


        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            z-index: 10002;
            pointer-events: none;
            animation: rise 4s infinite ease-in;
        }

        /* --- ANIMATIONS --- */
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes fallAndFloat {
            0% { transform: translateY(0) rotate(-10deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translateY(85vh) rotate(20deg); }
            60% { transform: translateY(75vh) rotate(10deg); }
            100% { transform: translateY(80vh) rotate(15deg); opacity: 0; }
        }

        @keyframes fillUp {
            0% { height: 0%; }
            100% { height: 100%; }
        }

        @keyframes preloaderFadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- LOGO & NAV --- */
        .logo-link { text-decoration: none; display: inline-block; width: fit-content; }
        .logo { display: flex; flex-direction: column; text-transform: lowercase; line-height: 0.85; }
        .first-name { font-weight: 800; font-size: clamp(4rem, 12vw, 7rem); color: #ED4672; }
        .last-name { font-weight: 400; font-size: clamp(2rem, 6vw, 3.5rem); color: #E996AC; letter-spacing: -1px; }

        header { padding: 50px 10% 20px; display: flex; flex-direction: column; gap: 40px; }
        nav ul { list-style: none; display: flex; gap: 25px; }
        nav a { 
            text-decoration: none; color: #333; font-size: 1.2rem; font-weight: 500; 
            display: inline-block; 
            transition: color 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        nav a:hover { color: #FFB400; transform: translateY(-8px) scale(1.1); }

        /* --- MAIN CONTENT --- */
        main { padding: 40px 10%; flex: 1; }
        h1 { 
            font-weight: 500; 
            font-size: clamp(1.5rem, 4vw, 2rem);; 
            color: #ED4672; 
            margin-bottom: 30px; 
            text-transform: lowercase; 
        }

        footer { padding: 40px 0; text-align: center; font-size: 0.75rem; font-weight: 300; opacity: 0.6; }

        @media (max-width: 768px) {
            /* Mobile centering removed to match Contact page alignment */
        }
 .login-btn {
    position: absolute;
    top: 30px;
    right: 5%;
    z-index: 100; 
    
    background-color: #E996AC;
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 30px; 
    
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    text-transform: lowercase; 
    cursor: pointer;
    
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 15px rgba(233, 150, 172, 0.3);
}

.login-btn:hover {
    background-color: #ED4672; 
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 20px rgba(237, 70, 114, 0.4);
}

.login-btn:active {
    transform: translateY(0);
}


@media (max-width: 768px) {
    .login-btn {
        top: 20px;
        right: 10%;
        padding: 8px 20px;
        font-size: 0.9rem;
    }
}
/* The Grid Container */
.blog-grid {
    display: grid;
    /* Use 280px or 1fr to ensure it fits on small screens */
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
    gap: 30px; /* Slightly smaller gap for mobile */
    margin-top: 50px;
}

/* The Individual Postcard */
.post-card {
    background: #FFFDF9; 
    border: 1px solid rgba(0,0,0,0.05);
    aspect-ratio: 3 / 2; 
    padding: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 
        5px 5px 0px rgba(233, 150, 172, 0.2), 
        0 10px 20px rgba(0,0,0,0.05);
    transition: transform 0.3s ease;
    cursor: pointer;
}

.post-card:hover {
    transform: rotate(-1deg) translateY(-5px);
}


.post-card::after {
    content: '';
    position: absolute;
    top: 20px;
    right: 20px;
    width: 45px;
    height: 55px;
    border: 2px dashed #E996AC;
    border-radius: 3px;
    background-color: rgba(255, 180, 0, 0.1);
}



.post-image-container {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: calc(50% - 30px);
    height: 80%;
    background-color: #f0f0f0;
    overflow: hidden;
}

.post-image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: sepia(0.2); 
}



.post-date {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-bottom: 5px;
}
.read-more {
    color: #E996AC;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.9rem;
    margin-top: auto; 
    display: inline-block;
    transition: all 0.3s ease;
}

.read-more:hover {
    color: #ED4672; /* Slightly darker pink on hover */
    transform: translateX(5px); /* Tiny nudge to the right */
}


.read-more::after {
    content: ' ➔';
    font-size: 0.8rem;
    vertical-align: middle;
}

.post-content {
    border-left: 1px solid #eee; 
    margin-left: 50%;
    padding: 20px; /* Added consistent padding */
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* Changed from center to push content from the top */
    overflow: hidden; /* Prevents text from leaking out of the card */
}

.post-title {
    font-weight: 800;
    font-size: 1.1rem;
    color: #ED4672;
    line-height: 1.2;
    margin-bottom: 15px; /* Increased margin to push excerpt down */
}

.post-excerpt {
    font-size: 0.9rem;
    line-height: 1.5; /* Better readability */
    color: #000000;
    margin-bottom: 20px;
    
   
    word-wrap: break-word;
    overflow-wrap: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 3; /* Limits text to 3 lines so it never overflows the card */
    -webkit-box-orient: vertical;
    overflow: hidden;
}

@media (max-width: 600px) {
    .post-card {
        aspect-ratio: auto; /* Allow the card to grow vertically */
        height: auto;
        padding-bottom: 30px;
    }

    .post-image-container {
        position: relative; /* Bring it into the normal document flow */
        transform: none;
        top: 0;
        left: 0;
        width: 88%; /*not full width*/
        height: 200px; /* Fixed height for the image */
        margin-bottom: 15px;
    }

    .post-content {
        margin-left: 0; /* Remove the 50% offset */
        border-left: none; /* Remove the vertical line */
        border-top: 1px solid #eee; 
        padding: 15px 0 0 0;
    }

    .post-card::after {
        /* Hide or move the "stamp" dash if it overlaps content */
        top: 10px;
        right: 10px;
        width: 35px;
        height: 45px;
    }
}

    </style>
</head>
<body>
    <button class="login-btn" >login.</button>

    <div id="loader-wrapper">
        <div class="loader-logo-container">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </div>
        <div class="lemonade-fill"></div>
    </div>

    <header>
        <a href="index.html" class="logo-link">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </a>
        <nav>
            <ul>
                <li><a href="about.html">about.</a></li>
                <li><a href="contact.html">contact.</a></li>
                <li><a href="blog.html" style="color: #FFB400;">blog.</a></li>

    <main>
        <h1>my blog.</h1>

            <article class="post-card">
                <div class="post-image-container">
                    <img src="images/annaimg1.jpg" alt="Title">

        </div>
    </main>

    <footer>&copy; 2026-present anna richman<br><a href="" style="text-decoration:none; color: gray;" >design by rachel chen</a></footer>

    <script>
    const loader = document.getElementById('loader-wrapper');

    function createLemon() {
        if (!loader || getComputedStyle(loader).opacity === "0") return;
        const lemon = document.createElement('div');
        lemon.classList.add('lemon-slice');
        lemon.style.left = Math.random() * 90 + "vw";
        const duration = Math.random() * 2 + 3; 
        lemon.style.animation = `fallAndFloat ${duration}s ease-in-out forwards`;
        loader.appendChild(lemon);
        setTimeout(() => lemon.remove(), duration * 1000);
    }

    function createBubble() {
        if (!loader || getComputedStyle(loader).opacity === "0") return;
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        const size = Math.random() * 10 + 5 + "px";
        bubble.style.width = size;
        bubble.style.height = size;
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.animationDuration = Math.random() * 2 + 2 + "s";
        loader.appendChild(bubble);
        setTimeout(() => bubble.remove(), 4000);
    }

    const lemonInterval = setInterval(createLemon, 800);
    const bubbleInterval = setInterval(createBubble, 150);

    setTimeout(() => {
        clearInterval(lemonInterval);
        clearInterval(bubbleInterval);
    }, 5500);
    </script>
    
    <style>
    .cursor-petal {
        position: fixed;
        top: 0;
        left: 0;
        width: 18px;
        height: 24px;
        border-radius: 40% 60% 45% 55% / 40% 40% 60% 60%;
        pointer-events: none;
        z-index: 10005;
        opacity: 0.9;
        transform-origin: center;
        background: radial-gradient(circle at 0% 50%, #E996AC 0%,  #ED4672 60%);
        box-shadow: inset -2px -2px 4px rgba(0,0,0,0.05), 2px 2px 5px rgba(0,0,0,0.1);
        filter: contrast(1.1);
    }

    @keyframes fallAndFade {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.9; }
        100% { transform: translate(var(--tw-x), var(--tw-y)) rotate(var(--tw-r)) scale(0.4); opacity: 0; }
    }
    /* This targets the Netlify Identity widget specifically */
#netlify-identity-widget .nc-btn, 
#netlify-identity-widget button {
    background-color: #ED4672 !important;
    font-family: 'Inter', sans-serif !important;
    text-transform: lowercase !important;
    border-radius: 20px !important;
}

#netlify-identity-widget .nc-modal {
    border-radius: 15px !important;
    box-shadow: 0 20px 40px rgba(237, 70, 114, 0.15) !important;
}
    </style>

<script>
    document.addEventListener('mousemove', function(e) {
        if (Math.random() > 0.2) return; 
        const petal = document.createElement('div');
        petal.className = 'cursor-petal';
        petal.style.left = e.clientX + 'px';
        petal.style.top = e.clientY + 'px';
        const fallX = (Math.random() - 0.5) * 120 + 'px';
        const fallY = (Math.random() * 150 + 80) + 'px';
        const rotation = (Math.random() * 720 - 360) + 'deg';
        petal.style.setProperty('--tw-x', fallX);
        petal.style.setProperty('--tw-y', fallY);
        petal.style.setProperty('--tw-r', rotation);
        const scale = 0.8 + Math.random() * 0.5;
        petal.style.transform = `scale(${scale})`;
        petal.style.animation = 'fallAndFade 2s ease-out forwards';
        document.body.appendChild(petal);
        setTimeout(() => { petal.remove(); }, 2000);
    });

    // DYNAMIC BLOG LOADING LOGIC
    const grid = document.getElementById('post-container');

    async function loadPosts() {
        try {
            const response = await fetch('https://api.github.com/repos/rc072406/annarichman/contents/posts');
            const files = await response.json();
            
            for (let file of files) {
                if (file.name.endsWith('.html')) {
                    // Create a postcard for every html file in the posts folder
                    renderPostcard(file);
                }
            }
        } catch (e) { console.log("Posts folder not found yet."); }
    }

    function renderPostcard(file) {
        // Formats filename "my-post.html" to "My Post"
        const title = file.name.replace(/-/g, ' ').replace('.html', '');
        
        const article = document.createElement('article');
        article.className = 'post-card';
        article.innerHTML = `
            <div class="post-image-container">
                <img src="images/annaimg1.jpg" alt="${title}">
            </div>
            <div class="post-content">
                <span class="post-date">2026</span>
                <h2 class="post-title">${title}</h2>
                <p class="post-excerpt">Click below to read more about ${title}...</p>
                <a href="posts/${file.name}" class="read-more">read post.</a>
            </div>
        `;
        grid.appendChild(article);
    }

    loadPosts();
</script>

<script>
  // Initialize the identity widget
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          // If Anna logs in, send her to the admin dashboard
          document.location.href = "/admin/";
        });
      }
    });
  }

  // Handle the button click
  document.querySelector('.login-btn').addEventListener('click', () => {
    netlifyIdentity.open();
  });

  // Smooth close and redirect if she's already logged in
  netlifyIdentity.on('login', user => {
    netlifyIdentity.close();
    setTimeout(() => {
      window.location.href = '/admin/';
    }, 500);
  });
</script>
</body>
