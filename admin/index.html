<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna's Content Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const SUPABASE_URL = 'https://fzleimojwnqshiiwhyat.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_p8oT0gb81ULxGg68G3_S9w_XV0HC73d';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAccess() {
      const { data: { user } } = await _supabase.auth.getUser();
      
      // If not logged in via Supabase, go back to homepage
      if (!user) {
        window.location.href = "index.html"; 
        return;
      }
      
      // If logged in, initialize the CMS
      initCMS();
    }

   function initCMS() {
      window.CMS.init({
        config: {
          load_config_file: false,
          backend: {
            name: "github",
            repo: "rc072406/annarichman",
            branch: "main",
            auth_type: "implicit", // This is the magic line
            base_url: "annarichman.netlify.app", // Placeholder to prevent API errors
            auth_endpoint: "auth"
          },
          media_folder: "images",
          public_folder: "/images",
          collections: [
            {
              name: "blog",
              label: "Blog Posts",
              folder: "posts",
              create: true,
              slug: "{{year}}-{{month}}-{{day}}-{{slug}}",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Publish Date", name: "date", widget: "datetime" },
                { label: "Featured Photo", name: "thumbnail", widget: "image", required: false },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    }

    checkAccess();
  </script>
</body>
</html>
