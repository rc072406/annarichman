<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna's Content Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    const SUPABASE_URL = 'https://fzleimojwnqshiiwhyat.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_p8oT0gb81ULxGg68G3_S9w_XV0HC73d';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAccess() {
      const { data: { user } } = await _supabase.auth.getUser();
      // FIX: If NO user, send them back to the ROOT homepage login
      if (!user) {
        window.location.href = "admin/index.html"; 
        return;
      }
      
      // If user EXISTS, start the CMS content interface
      initCMS();
    }

    function initCMS() {
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "rc072406/annarichman",
            branch: "main",
            auth_type: "implicit"
          },
          load_config_file: false,
          media_folder: "images",
          public_folder: "/images",
          register_preview_style: "styles.css",
          collections: [
            {
              name: "blog",
              label: "Blog Posts",
              folder: "posts",
              create: true,
              slug: "{{year}}-{{month}}-{{day}}-{{slug}}",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Publish Date", name: "date", widget: "datetime" },
                { 
                  label: "Featured Photo", 
                  name: "thumbnail", 
                  widget: "image", 
                  required: false,
                  choose_url: true 
                },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    }

    // Start the process
    checkAccess();
  </script>
</body>
</html>
