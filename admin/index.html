<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Anna's Writing Room</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pink: #ff85a2; --soft-pink: #fff5f8; --dark-pink: #ed4672; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--soft-pink); display: flex; justify-content: center; padding: 40px; }
        
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(255,133,162,0.2); width: 100%; max-width: 700px; position: relative; }
        
        h1 { color: var(--pink); margin-top: 0; font-size: 24px; text-transform: lowercase; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--pink); }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        
        button { border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Segoe UI', sans-serif; text-transform: lowercase; }
        
        #submitBtn { background: var(--pink); color: white; width: 100%; }
        #submitBtn:hover { background: var(--dark-pink); transform: translateY(-2px); }
        
        #logout-btn { background: #fdf2f4; color: var(--pink); width: 100%; border: 1px solid var(--soft-pink); }
        #logout-btn:hover { background: #ffe4e9; color: var(--dark-pink); }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>new blog post.</h1>
    
    <input type="text" id="title" placeholder="catchy title...">
    <input type="text" id="image" placeholder="image url (link to a photo)...">
    <textarea id="content" rows="12" placeholder="write your magic here..."></textarea>
    
    <div class="btn-group">
        <button id="submitBtn">publish post.</button>
        <button id="logout-btn">logout.</button>
    </div>
    
    <p id="status"></p>
</div>

<script src="../supabase-auth.js"></script>

<script>
    // 1. Protection (using  external file logic)
    protectAdminPage();

    // 2. Submission Logic
    document.getElementById('submitBtn').onclick = async () => {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const image_url = document.getElementById('image').value;
        const status = document.getElementById('status');

        if (!title || !content) {
            status.style.color = "red";
            status.innerText = "Please add a title and some content!";
            return;
        }

        status.style.color = "orange";
        status.innerText = "Sending to the blog...";

        // _supabase is defined inside supabase-auth.js
        const { error } = await _supabase
            .from('posts')
            .insert([{ title, content, image_url }]);

        if (error) {
            status.style.color = "red";
            status.innerText = "Error: " + error.message;
        } else {
            status.style.color = "green";
            status.innerText = "✨ Published Successfully!";
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('image').value = '';
        }
    };

    // 3. Logout Logic
    document.getElementById('logout-btn').addEventListener('click', () => {
        logoutUser();
    });
</script>

</body>
</html>
