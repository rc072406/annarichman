<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Anna's Writing Room</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --pink: #ff85a2; --soft-pink: #fff5f8; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--soft-pink); display: flex; justify-content: center; padding: 40px; }
    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(255,133,162,0.2); width: 100%; max-width: 700px; }
    h1 { color: var(--pink); margin-top: 0; }
    input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
    input:focus, textarea:focus { border-color: var(--pink); }
    button { background: var(--pink); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    button:hover { background: #ff6b8d; transform: translateY(-2px); }
    #status { text-align: center; margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>

<div class="card">
  <h1>New Blog Post</h1>
  <input type="text" id="title" placeholder="Catchy Title...">
  <input type="text" id="image" placeholder="Image URL (link to a photo)...">
  <textarea id="content" rows="12" placeholder="Write your magic here..."></textarea>
  <button id="submitBtn">Publish Post</button>
  <p id="status"></p>
</div>

<script>
  const SUPABASE_URL = 'https://fzleimojwnqshiiwhyat.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_p8oT0gb81ULxGg68G3_S9w_XV0HC73d';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Guard the door
  async function checkUser() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) window.location.href = "../index.html";
  }
  checkUser();

  document.getElementById('submitBtn').onclick = async () => {
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const image_url = document.getElementById('image').value;
    const status = document.getElementById('status');

    if (!title || !content) {
      status.style.color = "red";
      status.innerText = "Please add a title and some content!";
      return;
    }

    status.style.color = "orange";
    status.innerText = "Sending to the blog...";

    const { error } = await _supabase
      .from('posts')
      .insert([{ title, content, image_url }]);

    if (error) {
      status.style.color = "red";
      status.innerText = "Error: " + error.message;
    } else {
      status.style.color = "green";
      status.innerText = "✨ Published Successfully!";
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      document.getElementById('image').value = '';
    }
  };
</script>

</body>
</html>
