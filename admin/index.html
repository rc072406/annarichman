<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna's Content Manager</title>
  <meta name="google" content="notranslate" /> 
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
   
    window.onload = () => {
      window.CMS.init({
        config: {
          load_config_file: false,
          backend: {
            name: "test-repo" // We use test-repo just to see if it STOPS crashing
          },
          display_url: "https://rc072406.github.io/annarichman/",
          collections: [
            {
              name: "blog",
              label: "Blog Posts",
              folder: "posts",
              create: true,
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    };
  </script>
</body>
</html>
