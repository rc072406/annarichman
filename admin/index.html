<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Anna's Admin Debug</title>
</head>
<body>
  <div id="status">Loading CMS... if this stays here, the script failed to load :((((.</div>
  
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    try {
      window.CMS.init({
        config: {
          load_config_file: false,
          backend: {
            name: "test-repo" // This requires NO login. It should show the dashboard immediately.
          },
          collections: [
            {
              name: "blog",
              label: "Blog",
              folder: "posts",
              fields: [{ label: "Title", name: "title", widget: "string" }]
            }
          ]
        }
      });
      document.getElementById('status').style.display = 'none';
    } catch (e) {
      document.getElementById('status').innerText = "CMS Error: " + e.message;
    }
  </script>
</body>
</html>
