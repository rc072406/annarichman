backend:
  name: github
  repo: rc072406/annarichman
  branch: main
  auth_type: implicit
  app_id: Ov23liaZJn9avvkhTz14
  # Adding these lines bypasses the Netlify API check
  base_url: https://gatekeeper-v6cv.onrender.com
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Photo", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
