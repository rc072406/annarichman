<!DOCTYPE html>
<html>
<head>
    <title>Logging in...</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #FFDAC5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { font-size: 1.2rem; color: #ED4672; }
    </style>
</head>
<body>
    <div class="loader">🌸 Logging in...</div>
    <script>
        const code = new URLSearchParams(window.location.search).get('code');
        
        if (code) {
            sessionStorage.setItem('githubCode', code);
            sessionStorage.setItem('userEmail', new Date().toISOString());
            window.location = 'blog.html';
        } else {
            window.location = 'blog.html';
        }
    </script>
</body>
</html>
