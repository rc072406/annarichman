<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact | Anna Richman</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #FFDAC5; 
            font-family: 'Inter', sans-serif;
            color: #333;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }

        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFDAC5;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: preloaderFadeOut 0.6s forwards 5.5s; 
        }

        .loader-logo-container {
            z-index: 10001;
            pointer-events: none;
        }

        .lemonade-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: rgba(255, 192, 203, 0.7) !important;
            z-index: 10000;
            animation: fillUp 5s ease-in-out forwards 0.3s;
        }
        .lemon-slice {
            position: absolute;
            width: 120px;
            height: 60px; 
            background: linear-gradient(to bottom, #fbdc33 0%, #f9d71c 100%); 
            border-radius: 120px 120px 0 0; 
            border: 5px solid #fffdf0; 
            border-bottom: 2px solid #f9d71c;
            z-index: 10001;
            pointer-events: none;
            top: -100px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1), inset 0 -2px 5px rgba(0,0,0,0.05);
            background: radial-gradient(circle at 50% 100%, #fff9c4 20%, #f9d71c 100%);
        }

        .lemon-slice::after {
            content: '';
            position: absolute;
            width: 110px; 
            height: 110px;
            bottom: -55px; 
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            background: conic-gradient(
                from -90deg,
                #fce862 0deg 40deg,
                #fffdf0 40deg 45deg,
                #fce862 45deg 85deg,
                #fffdf0 85deg 90deg,
                #fce862 90deg 130deg,
                #fffdf0 130deg 135deg,
                #fce862 135deg 175deg,
                #fffdf0 175deg 180deg,
                transparent 180deg
            );
        }

        .lemon-slice::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 20px;
            width: 30px;
            height: 10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(2px);
            z-index: 10002;
            transform: rotate(-20deg);
        }

        @keyframes fallAndFloat {
            0% { transform: translateY(0) rotate(-10deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translateY(85vh) rotate(20deg); }
            60% { transform: translateY(75vh) rotate(10deg); }
            100% { transform: translateY(80vh) rotate(15deg); opacity: 0; }
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            z-index: 10002;
            pointer-events: none;
            animation: rise 4s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes fillUp { 0% { height: 0%; } 100% { height: 100%; } }
        @keyframes preloaderFadeOut { to { opacity: 0; visibility: hidden; } }

        .logo-link { text-decoration: none; display: inline-block; width: fit-content; }
        .logo { display: flex; flex-direction: column; text-transform: lowercase; line-height: 0.85; }
        .first-name { font-weight: 800; font-size: clamp(4rem, 12vw, 7rem); color: #ED4672; }
        .last-name { font-weight: 400; font-size: clamp(2rem, 6vw, 3.5rem); color: #E996AC; letter-spacing: -1px; }

        header { padding: 50px 10% 20px; display: flex; flex-direction: column; gap: 40px; position: relative; z-index: 100; }
        nav ul { list-style: none; display: flex; gap: 25px; }
        nav a { text-decoration: none; color: #333; font-size: 1.2rem; font-weight: 500; display: inline-block; transition: color 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        nav a:hover { color: #FFB400; transform: translateY(-8px) scale(1.1); }

        main { padding: 40px 10%; flex: 1; position: relative; min-height: 80vh; }
        h1 { font-weight: 800; font-size: clamp(2.5rem, 6vw, 4rem); color: #ED4672; margin-bottom: 30px; text-transform: lowercase; }

        footer { padding: 40px 0; text-align: center; font-size: 0.75rem; font-weight: 300; text-transform: lowercase; opacity: 0.6; position: relative; z-index: 110; margin-top: auto; }

        #dandelionCanvas {
            position: fixed;
            top: 0; 
            left: 0;
            width: 100%;
            height: 100svh; 
            z-index: 1;
            touch-action: none;
            user-select: none;
            pointer-events: none; 
            display: block;
        }

        .contact-btn {
            display: inline-block;
            padding: 15px 35px;
            background: linear-gradient(90deg, #ED4672, #FF7C15, #ED4672);
            background-size: 200% auto; 
            color: #fff;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            border-radius: 50px;
            text-transform: lowercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(237, 70, 114, 0.2);
            position: relative;
            z-index: 10;
            animation: shiftGradient 4s linear infinite;
        }

        @keyframes shiftGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .contact-btn:hover {
            background-color: #FF7C15; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 124, 21, 0.3);
            animation-play-state: paused; 
        }

        .contact-btn:active { transform: translateY(1px) scale(0.98); }

        .cursor-petal {
            position: fixed;
            top: 0;
            left: 0;
            width: 18px;
            height: 24px;
            border-radius: 40% 60% 45% 55% / 40% 40% 60% 60%;
            pointer-events: none;
            z-index: 10005;
            opacity: 0.9;
            transform-origin: center;
            background: radial-gradient(circle at 0% 50%, #FFD700 0%, #FFFDF0 60%);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.05), 2px 2px 5px rgba(0,0,0,0.1);
            filter: contrast(1.1);
        }

        @keyframes fallAndFade {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.9; }
            100% { transform: translate(var(--tw-x), var(--tw-y)) rotate(var(--tw-r)) scale(0.4); opacity: 0; }
        }
        .login-btn {
    position: absolute;
    top: 30px;
    right: 5%;
    z-index: 100; 
    
    background-color: #E996AC;
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 30px; 
    
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    text-transform: lowercase; 
    cursor: pointer;
    
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 15px rgba(233, 150, 172, 0.3);
}

.login-btn:hover {
    background-color: #ED4672; 
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 20px rgba(237, 70, 114, 0.4);
}

.login-btn:active {
    transform: translateY(0);
}


@media (max-width: 768px) {
    .login-btn {
        top: 20px;
        right: 10%;
        padding: 8px 20px;
        font-size: 0.9rem;
    }
}
    </style>
</head>
<body>
    <button class="login-btn">login.</button>

    <div id="loader-wrapper">
        <div class="loader-logo-container">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </div>
        <div class="lemonade-fill"></div>
    </div>

    <header>
        <a href="index.html" class="logo-link">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </a>
        <nav>
            <ul>
                <li><a href="about.html">about.</a></li>
                <li><a href="contact.html" style="color: #FFB400;">contact.</a></li>
                <li><a href="blog.html">blog.</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>let's keep in touch.</h1>
        <div style="margin-top: 20px;">
            <a href="mailto:annarchmn@gmail.com" class="contact-btn">send a message</a>
        </div>
        <canvas id="dandelionCanvas"></canvas>
    </main>

    <footer>&copy; 2026-present anna richman</footer>

    <script>
        const canvas = document.getElementById('dandelionCanvas');
        const ctx = canvas.getContext('2d');
        let currentWidth = window.innerWidth;

        // --- RAIN LOGIC ---
        let isRaining = false;
        const raindrops = [];
        let totalSeedsCount = 0;

        class RainDrop {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height * 2; 
                this.speed = 12 + Math.random() * 8;
                this.len = 25 + Math.random() * 15;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = -50;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(130, 170, 220, 0.6)';
                ctx.lineWidth = 1.2;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.len);
                ctx.stroke();
            }
        }

        const dandelions = [];
        const yellowFlowers = [];
        const mouse = { x: -200, y: -200 };

        function handleInput(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            mouse.x = clientX - rect.left;
            mouse.y = clientY - rect.top;
        }

        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchstart', handleInput, { passive: true });
        window.addEventListener('touchmove', handleInput, { passive: true });

        class Seed {
            constructor() {
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.isFloating = false;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.1;
                this.offsetX = 0;
                this.offsetY = 0;
                this.x = 0;
                this.y = 0;
            }
            update(headX, headY) {
                if (!this.isFloating) {
                    this.x = headX + this.offsetX;
                    this.y = headY + this.offsetY;
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 60) this.isFloating = true;
                } else {
                    const globalBreeze = Math.sin(Date.now() * 0.001) * 0.5;
                    this.x += this.vx + 1.6 + globalBreeze; 
                    this.y += this.vy - 0.4;
                    this.angle += this.spin;
                    this.vy += Math.sin(Date.now() * 0.002) * 0.03;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + Math.cos(this.angle) * 6, this.y + Math.sin(this.angle) * 6);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        class WishDandelion {
            constructor(x) {
                this.x = x;
                this.stemHeight = 40 + Math.random() * 140;
                this.offset = Math.random() * 100;
                this.stemColor = `rgba(${110 + Math.random()*30}, ${140 + Math.random()*30}, 100, 0.45)`;
                this.localSeeds = [];
                this.generateSeeds();
            }
            generateSeeds() {
                this.localSeeds = [];
                const seedCount = 12 + Math.floor(Math.random() * 8);
                for (let i = 0; i < seedCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 15;
                    const s = new Seed();
                    s.offsetX = Math.cos(angle) * radius;
                    s.offsetY = Math.sin(angle) * radius;
                    this.localSeeds.push(s);
                }
            }
            draw() {
                const groundY = canvas.height;
                const wind = Math.sin(Date.now() * 0.0012 + this.offset) * 12;
                const headX = this.x + wind;
                const headY = (groundY - this.stemHeight);
                
                ctx.beginPath();
                ctx.moveTo(this.x, groundY + 5);
                ctx.quadraticCurveTo(this.x, groundY - this.stemHeight / 2, headX, headY);
                ctx.strokeStyle = this.stemColor;
                ctx.lineWidth = 1.8;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                this.localSeeds.forEach(seed => {
                    seed.update(headX, headY);
                    seed.draw();
                });
            }
        }

        class YellowDandelion {
            constructor(x) {
                this.x = x;
                this.stemHeight = 25 + Math.random() * 80;
                this.offset = Math.random() * 100;
            }
            draw() {
                const groundY = canvas.height;
                const wind = Math.sin(Date.now() * 0.0015 + this.offset) * 8;
                const headX = this.x + wind;
                const headY = groundY - this.stemHeight;
                
                ctx.beginPath();
                ctx.moveTo(this.x, groundY + 5);
                ctx.quadraticCurveTo(this.x, groundY - this.stemHeight / 2, headX, headY);
                ctx.strokeStyle = 'rgba(90, 120, 70, 0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#FFD700';
                for(let i=0; i<8; i++) {
                    ctx.beginPath();
                    ctx.ellipse(headX, headY, 8, 3, (i * Math.PI/4), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.beginPath();
                ctx.arc(headX, headY, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = '#FFA500';
                ctx.fill();
            }
        }

        function initField() {
            dandelions.length = 0;
            yellowFlowers.length = 0;
            totalSeedsCount = 0; 
            const wishDensity = Math.floor(window.innerWidth / 12); 
            const yellowDensity = Math.floor(window.innerWidth / 20);
            for (let i = 0; i < wishDensity; i++) {
                const d = new WishDandelion(Math.random() * canvas.width);
                dandelions.push(d);
                totalSeedsCount += d.localSeeds.length;
            }
            for (let i = 0; i < yellowDensity; i++) yellowFlowers.push(new YellowDandelion(Math.random() * canvas.width));
        }

        // NEW: Regrow seeds on the existing stems to prevent jumping
        function regrowSeedsOnly() {
            totalSeedsCount = 0;
            dandelions.forEach(d => {
                d.generateSeeds();
                totalSeedsCount += d.localSeeds.length;
            });
        }

        function checkRegrowth() {
            if (isRaining) return;
            const attachedSeeds = dandelions.reduce((sum, d) => sum + d.localSeeds.filter(s => !s.isFloating).length, 0);
            
            // Trigger rain when 30% are gone (meaning 70% or fewer remain)
            if (attachedSeeds <= (totalSeedsCount * 0.7) && dandelions.length > 0) {
                isRaining = true;
                raindrops.length = 0;
                for (let i = 0; i < 120; i++) raindrops.push(new RainDrop());
                setTimeout(() => {
                    isRaining = false;
                    regrowSeedsOnly(); // Keep stems, just put seeds back
                }, 7000);
            }
        }

        function resize() {
            if (window.innerWidth === currentWidth && Math.abs(window.innerHeight - canvas.height) < 100) return;
            currentWidth = window.innerWidth;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight; 
            initField();
        }

        window.addEventListener('resize', resize);
        resize();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isRaining) {
                raindrops.forEach(r => { r.update(); r.draw(); });
            }
            yellowFlowers.forEach(f => f.draw());
            dandelions.forEach(d => d.draw());
            checkRegrowth();
            requestAnimationFrame(animate);
        }
        animate();

        // Loader & Cursor logic
        const loader = document.getElementById('loader-wrapper');
        function createLemon() {
            if (!loader || getComputedStyle(loader).opacity === "0") return;
            const lemon = document.createElement('div');
            lemon.classList.add('lemon-slice');
            lemon.style.left = Math.random() * 90 + "vw";
            const duration = Math.random() * 2 + 3; 
            lemon.style.animation = `fallAndFloat ${duration}s ease-in-out forwards`;
            loader.appendChild(lemon);
            setTimeout(() => lemon.remove(), duration * 1000);
        }

        function createBubble() {
            if (!loader || getComputedStyle(loader).opacity === "0") return;
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            const size = Math.random() * 10 + 5 + "px";
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + "vw";
            bubble.style.animationDuration = Math.random() * 2 + 2 + "s";
            loader.appendChild(bubble);
            setTimeout(() => bubble.remove(), 4000);
        }

        const lemonInterval = setInterval(createLemon, 800);
        const bubbleInterval = setInterval(createBubble, 150);
        setTimeout(() => { clearInterval(lemonInterval); clearInterval(bubbleInterval); }, 6000);

        document.addEventListener('mousemove', function(e) {
            if (Math.random() > 0.2) return; 
            const petal = document.createElement('div');
            petal.className = 'cursor-petal';
            petal.style.left = e.clientX + 'px';
            petal.style.top = e.clientY + 'px';
            const fallX = (Math.random() - 0.5) * 120 + 'px';
            const fallY = (Math.random() * 150 + 80) + 'px';
            const rotation = (Math.random() * 720 - 360) + 'deg';
            petal.style.setProperty('--tw-x', fallX);
            petal.style.setProperty('--tw-y', fallY);
            petal.style.setProperty('--tw-r', rotation);
            const scale = 0.8 + Math.random() * 0.5;
            petal.style.transform = `scale(${scale})`;
            petal.style.animation = 'fallAndFade 2s ease-out forwards';
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 2000);
        });
    </script>
</body>
</html>
