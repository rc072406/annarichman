        * {

        /* --- LEMONADE LOADING TRANSITION (Consistent Sizing) --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFDAC5;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: preloaderFadeOut 0.6s forwards 3.2s; 
        }

        .loader-logo-container {
            z-index: 10001;
            pointer-events: none;
        }

        .lemonade-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: rgba(237, 70, 114, 0.7); 
            z-index: 10000;
            animation: fillUp 2.5s ease-in-out forwards 0.3s;
        }

        @keyframes fillUp {
            0% { height: 0%; }
            100% { height: 100%; }
        }

        @keyframes preloaderFadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- LOGO STYLES --- */
        .logo-link {
            text-decoration: none;
            display: inline-block;
            width: fit-content;
        }

        .logo {
            display: flex;
            flex-direction: column;
            text-transform: lowercase;

        }

        .first-name {
            font-weight: 800;
            font-size: clamp(4rem, 12vw, 7rem);
            color: #ED4672;
        }

        .last-name {
            font-weight: 300;
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: #FF7C15;
            letter-spacing: -1px;
        }

        /* --- HEADER & NAV --- */

            padding: 50px 10% 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;

        nav a {
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
            display: inline-block;
            transition: color 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        nav a:hover {

            transform: translateY(-8px) scale(1.1);

        /* --- MAIN CONTENT (Placeholder) --- */
        main {

        }

        @media (max-width: 768px) {
            header { align-items: center; text-align: center; }
            main { text-align: center; }

        position: relative;

<canvas id="dandelionCanvas"></canvas>

<style>
    .contact-btn {
        display: inline-block;
        padding: 15px 35px;
        background-color: #ED4672; 
        color: #fff;
        text-decoration: none;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 1rem;
        border-radius: 50px;
        text-transform: lowercase;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(237, 70, 114, 0.2);
    }

    .contact-btn:hover {
        background-color: #FF7C15;
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(255, 124, 21, 0.3);
    }

    #dandelionCanvas {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 70vh; 
    pointer-events: auto;
    z-index: 1;
    /* Added touch-action to prevent mobile swiping/scrolling on canvas */
    touch-action: none;
}

    main {
        position: relative;
        min-height: 70vh;
    }
</style>

<script>
    const canvas = document.getElementById('dandelionCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.7;
        initField();
    }

    const dandelions = [];
    const yellowFlowers = [];
    const mouse = { x: -200, y: -200 };

    /* --- ADDED TOUCH HANDLING FOR MOBILE AH--- */
    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;

        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        mouse.x = clientX - rect.left;
        mouse.y = clientY - rect.top;
    }

    window.addEventListener('mousemove', handleInput);
    window.addEventListener('touchstart', handleInput);
    window.addEventListener('touchmove', (e) => {
        handleInput(e);
        e.preventDefault(); // Extra layer to prevent scrolling
    }, { passive: false });

    class Seed {
        constructor() {
            this.vx = (Math.random() - 0.5) * 1.5;
            this.vy = (Math.random() - 0.5) * 1.5;
            this.isFloating = false;
            this.angle = Math.random() * Math.PI * 2;
            this.spin = (Math.random() - 0.5) * 0.1;
            this.offsetX = 0;
            this.offsetY = 0;
            this.x = 0;
            this.y = 0;
        }
        update(headX, headY) {
            if (!this.isFloating) {
                this.x = headX + this.offsetX;
                this.y = headY + this.offsetY;
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                // Increased detection slightly for easier mobile tapping
                if (Math.sqrt(dx * dx + dy * dy) < 60) this.isFloating = true;
            } else {
                this.x += this.vx + 1.4; 
                this.y += this.vy - 0.4;
                this.angle += this.spin;
                this.vy += Math.sin(Date.now() * 0.002) * 0.03;
            }
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + Math.cos(this.angle) * 6, this.y + Math.sin(this.angle) * 6);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }

    class WishDandelion {
        constructor(x) {
            this.x = x;
            this.y = canvas.height + 30;
            this.stemHeight = 40 + Math.random() * 140;
            this.offset = Math.random() * 100;
            this.stemColor = `rgba(${110 + Math.random()*30}, ${140 + Math.random()*30}, 100, 0.45)`;
            this.localSeeds = [];
            
            const seedCount = 12 + Math.floor(Math.random() * 8);
            for (let i = 0; i < seedCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 15;
                const s = new Seed();
                s.offsetX = Math.cos(angle) * radius;
                s.offsetY = Math.sin(angle) * radius;
                this.localSeeds.push(s);
            }
        }
        draw() {
            const wind = Math.sin(Date.now() * 0.0008 + this.offset) * 6;
            const headX = this.x + wind;
            const headY = (canvas.height - this.stemHeight);

            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.quadraticCurveTo(this.x + (wind/2), this.y - this.stemHeight/2, headX, headY);
            ctx.strokeStyle = this.stemColor;
            ctx.lineWidth = 1.8;
            ctx.stroke();

            this.localSeeds.forEach(seed => {
                seed.update(headX, headY);
                seed.draw();
            });
        }
    }

    class YellowDandelion {
        constructor(x) {
            this.x = x;
            this.y = canvas.height + 30;
            this.stemHeight = 25 + Math.random() * 80;
            this.offset = Math.random() * 100;
        }
        draw() {
            const wind = Math.sin(Date.now() * 0.001 + this.offset) * 4;
            const headX = this.x + wind;
            const headY = canvas.height - this.stemHeight;

            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.quadraticCurveTo(this.x + (wind/2), this.y - this.stemHeight/2, headX, headY);
            ctx.strokeStyle = 'rgba(90, 120, 70, 0.4)';
            ctx.stroke();

            ctx.fillStyle = '#FFD700';
            for(let i=0; i<8; i++) {
                ctx.beginPath();
                ctx.ellipse(headX, headY, 8, 3, (i * Math.PI/4), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.beginPath();
            ctx.arc(headX, headY, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = '#FFA500';
            ctx.fill();
        }
    }

    function initField() {
        dandelions.length = 0;
        yellowFlowers.length = 0;
        // Adjusted density for better performance
        const wishDensity = Math.floor(window.innerWidth / 12); 
        const yellowDensity = Math.floor(window.innerWidth / 20);

        for (let i = 0; i < wishDensity; i++) {
            dandelions.push(new WishDandelion(Math.random() * canvas.width));
        }
        for (let i = 0; i < yellowDensity; i++) {
            yellowFlowers.push(new YellowDandelion(Math.random() * canvas.width));
        }
    }

    window.addEventListener('resize', resize);
    resize();

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        yellowFlowers.forEach(f => f.draw());
        dandelions.forEach(d => d.draw());
        requestAnimationFrame(animate);
    }
    animate();
</script>
        </main>

        &copy; 2026-present anna richman

</body>
