<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact | Anna Richman</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #FFDAC5; 
            font-family: 'Inter', sans-serif;
            color: #333;
            /* CHANGED TO DVH: prevents jumping when mobile address bar hides */
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* PREVENTS PULL-TO-REFRESH GLITCHES */
            overscroll-behavior-y: none;
        }

        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFDAC5;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: preloaderFadeOut 0.6s forwards 3.2s; 
        }

        .loader-logo-container {
            z-index: 10001;
            pointer-events: none;
        }

         /* --- LEMONADE FILL  --- */
.lemonade-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0%;
    background-color: rgba(255, 192, 203, 0.7) !important; /* Soft Pink */
    z-index: 10000;
    animation: fillUp 5s ease-in-out forwards 0.3s; /* Changed to 5s */
}
/* --- THE HALF SLICE --- */
.lemon-slice {
    position: absolute;
    width: 130px;
    height: 65px; 
    
    background-color: #fbdc33; 
    border-radius: 130px 130px 0 0; 
    border: 6px solid #f9d71c;
    border-bottom: none;
    z-index: 10001;
    pointer-events: none;
    top: -100px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.lemon-slice::after {
    content: '';
    position: absolute;
    width: 130px; /* Matches the slice width */
    height: 130px; /* Full circle */
    bottom: -65px; /* Aligns center to the flat edge */
    border-radius: 50%;
   
    background: conic-gradient(
        transparent 0deg 42deg, 
        rgba(255, 253, 236, 0.8) 42deg 45deg, 
        transparent 45deg 87deg, 
        rgba(255, 253, 236, 0.8) 87deg 90deg, 
        transparent 90deg 132deg, 
        rgba(255, 253, 236, 0.8) 132deg 135deg, 
        transparent 135deg 177deg, 
        rgba(255, 253, 236, 0.8) 177deg 180deg,
        transparent 180deg
    );
}

/* --- THE WOBBLE ANIMATION --- */
@keyframes fallAndFloat {
    0% { transform: translateY(0) rotate(-10deg); opacity: 0; }
    10% { opacity: 1; }
    35% { transform: translateY(85vh) rotate(20deg); } /* Hit the juice */
    /* The Wobble */
    50% { transform: translateY(75vh) rotate(-10deg); } 
    65% { transform: translateY(82vh) rotate(8deg); }
    80% { transform: translateY(79vh) rotate(-3deg); }
    100% { transform: translateY(80vh) rotate(0deg); opacity: 0; }
}



/* --- THE WOBBLE ANIMATION --- */
@keyframes fallAndFloat {
    0% { transform: translateY(0) rotate(-10deg); opacity: 0; }
    10% { opacity: 1; }
    40% { transform: translateY(85vh) rotate(20deg); } /* Hits bottom area */
    /* Wobble Effect: Subtle rotations and vertical bobs */
    55% { transform: translateY(78vh) rotate(-5deg); } 
    70% { transform: translateY(82vh) rotate(10deg); }
    85% { transform: translateY(79vh) rotate(-2deg); }
    100% { transform: translateY(80vh) rotate(0deg); opacity: 0; }
}

/* --- FIZZY BUBBLES --- */
.bubble {
    position: absolute;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 50%;
    z-index: 10002;
    pointer-events: none;
    animation: rise 4s infinite ease-in;
}

@keyframes rise {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    50% { opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

@keyframes fallAndFloat {
    0% { transform: translateY(0) rotate(-10deg); opacity: 0; }
    10% { opacity: 1; }
    40% { transform: translateY(85vh) rotate(20deg); } /* Hits bottom */
    60% { transform: translateY(75vh) rotate(10deg); } /* Bobs up */
    100% { transform: translateY(80vh) rotate(15deg); opacity: 0; }
}

/* Ensure the loader stays visible longer to match the 5s fill */
#loader-wrapper {
    animation: preloaderFadeOut 0.8s forwards 5.5s !important;
}

        @keyframes fillUp { 0% { height: 0%; } 100% { height: 100%; } }
        @keyframes preloaderFadeOut { to { opacity: 0; visibility: hidden; } }

        .logo-link { text-decoration: none; display: inline-block; width: fit-content; }
        .logo { display: flex; flex-direction: column; text-transform: lowercase; line-height: 0.85; }
        .first-name { font-weight: 800; font-size: clamp(4rem, 12vw, 7rem); color: #ED4672; }
        .last-name { font-weight: 400; font-size: clamp(2rem, 6vw, 3.5rem); color: #E996AC; letter-spacing: -1px; }

        header { padding: 50px 10% 20px; display: flex; flex-direction: column; gap: 40px; position: relative; z-index: 100; }
        nav ul { list-style: none; display: flex; gap: 25px; }
        nav a { text-decoration: none; color: #333; font-size: 1.2rem; font-weight: 500; display: inline-block; transition: color 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        nav a:hover { color: #FFB400; transform: translateY(-8px) scale(1.1); }

        main { padding: 40px 10%; flex: 1; position: relative; min-height: 80vh; }
        h1 { font-weight: 800; font-size: clamp(2.5rem, 6vw, 4rem); color: #ED4672; margin-bottom: 30px; text-transform: lowercase; }

        footer { padding: 40px 0; text-align: center; font-size: 0.75rem; font-weight: 300; text-transform: lowercase; opacity: 0.6; position: relative; z-index: 110; margin-top: auto; }

        #dandelionCanvas {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70svh; 
            z-index: 1;
            touch-action: none;
            user-select: none;
        }

        .contact-btn {
            display: inline-block;
            padding: 15px 35px;
            
            background: linear-gradient(90deg, #ED4672, #FF7C15, #ED4672);
            background-size: 200% auto; 
            color: #fff;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            border-radius: 50px;
            text-transform: lowercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(237, 70, 114, 0.2);
            position: relative;
            z-index: 10;
            
           
            animation: shiftGradient 4s linear infinite;
        }

        
        @keyframes shiftGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        
        .contact-btn:hover {
            
            background-color: #FF7C15; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 124, 21, 0.3);
            animation-play-state: paused; 
        }

        .contact-btn:active {
            transform: translateY(1px) scale(0.98);
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-logo-container">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </div>
        <div class="lemonade-fill"></div>
    </div>

    <header>
        <a href="index.html" class="logo-link">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </a>
        <nav>
            <ul>
                <li><a href="about.html">about.</a></li>
                <li><a href="contact.html" style="color: #FFB400;">contact.</a></li>
                <li><a href="blog.html">blog.</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>let's keep in touch.</h1>
        <div style="margin-top: 20px;">
            <a href="mailto:annarchmn@gmail.com" class="contact-btn">send a message</a>
        </div>
        <canvas id="dandelionCanvas"></canvas>
    </main>

    <footer>&copy; 2026-present anna richman</footer>

    <script>
        const canvas = document.getElementById('dandelionCanvas');
        const ctx = canvas.getContext('2d');

        let currentWidth = window.innerWidth;

        function resize() {
            // UPDATED LOGIC: Only re-init if width changes OR height changes significantly (>100px)
            // This stops the flickering when the mobile URL bar slides in/out
            const hDiff = Math.abs(window.innerHeight * 0.7 - canvas.height);
            if (window.innerWidth === currentWidth && hDiff < 100 && dandelions.length > 0) return;
            
            currentWidth = window.innerWidth;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.7;
            initField();
        }

        const dandelions = [];
        const yellowFlowers = [];
        const mouse = { x: -200, y: -200 };

        function handleInput(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            mouse.x = clientX - rect.left;
            mouse.y = clientY - rect.top;
        }

        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchstart', handleInput, { passive: true });
        window.addEventListener('touchmove', handleInput, { passive: true });

        class Seed {
            constructor() {
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.isFloating = false;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.1;
                this.offsetX = 0;
                this.offsetY = 0;
                this.x = 0;
                this.y = 0;
            }
            update(headX, headY) {
                if (!this.isFloating) {
                    this.x = headX + this.offsetX;
                    this.y = headY + this.offsetY;
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 60) this.isFloating = true;
                } else {
                    this.x += this.vx + 1.4; 
                    this.y += this.vy - 0.4;
                    this.angle += this.spin;
                    this.vy += Math.sin(Date.now() * 0.002) * 0.03;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + Math.cos(this.angle) * 6, this.y + Math.sin(this.angle) * 6);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        class WishDandelion {
            constructor(x) {
                this.x = x;
                this.y = canvas.height + 30;
                this.stemHeight = 40 + Math.random() * 140;
                this.offset = Math.random() * 100;
                this.stemColor = `rgba(${110 + Math.random()*30}, ${140 + Math.random()*30}, 100, 0.45)`;
                this.localSeeds = [];
                const seedCount = 12 + Math.floor(Math.random() * 8);
                for (let i = 0; i < seedCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 15;
                    const s = new Seed();
                    s.offsetX = Math.cos(angle) * radius;
                    s.offsetY = Math.sin(angle) * radius;
                    this.localSeeds.push(s);
                }
            }
            draw() {
                const wind = Math.sin(Date.now() * 0.0008 + this.offset) * 6;
                const headX = this.x + wind;
                const headY = (canvas.height - this.stemHeight);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(this.x + (wind/2), this.y - this.stemHeight/2, headX, headY);
                ctx.strokeStyle = this.stemColor;
                ctx.lineWidth = 1.8;
                ctx.stroke();
                this.localSeeds.forEach(seed => {
                    seed.update(headX, headY);
                    seed.draw();
                });
            }
        }

        class YellowDandelion {
            constructor(x) {
                this.x = x;
                this.y = canvas.height + 30;
                this.stemHeight = 25 + Math.random() * 80;
                this.offset = Math.random() * 100;
            }
            draw() {
                const wind = Math.sin(Date.now() * 0.001 + this.offset) * 4;
                const headX = this.x + wind;
                const headY = canvas.height - this.stemHeight;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(this.x + (wind/2), this.y - this.stemHeight/2, headX, headY);
                ctx.strokeStyle = 'rgba(90, 120, 70, 0.4)';
                ctx.stroke();
                ctx.fillStyle = '#FFD700';
                for(let i=0; i<8; i++) {
                    ctx.beginPath();
                    ctx.ellipse(headX, headY, 8, 3, (i * Math.PI/4), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.beginPath();
                ctx.arc(headX, headY, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = '#FFA500';
                ctx.fill();
            }
        }

        function initField() {
            dandelions.length = 0;
            yellowFlowers.length = 0;
            const wishDensity = Math.floor(window.innerWidth / 12); 
            const yellowDensity = Math.floor(window.innerWidth / 20);
            for (let i = 0; i < wishDensity; i++) dandelions.push(new WishDandelion(Math.random() * canvas.width));
            for (let i = 0; i < yellowDensity; i++) yellowFlowers.push(new YellowDandelion(Math.random() * canvas.width));
        }

        window.addEventListener('resize', resize);
        resize();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            yellowFlowers.forEach(f => f.draw());
            dandelions.forEach(d => d.draw());
            requestAnimationFrame(animate);
        }
        animate();
    </script>
    <script>
    const loader = document.getElementById('loader-wrapper');

    function createLemon() {
        if (!loader || getComputedStyle(loader).opacity === "0") return;
        const lemon = document.createElement('div');
        lemon.classList.add('lemon-slice');
        lemon.style.left = Math.random() * 90 + "vw";
        const duration = Math.random() * 2 + 3; 
        lemon.style.animation = `fallAndFloat ${duration}s ease-in-out forwards`;
        loader.appendChild(lemon);
        setTimeout(() => lemon.remove(), duration * 1000);
    }

    function createBubble() {
        if (!loader || getComputedStyle(loader).opacity === "0") return;
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        const size = Math.random() * 10 + 5 + "px";
        bubble.style.width = size;
        bubble.style.height = size;
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.animationDuration = Math.random() * 2 + 2 + "s";
        loader.appendChild(bubble);
        setTimeout(() => bubble.remove(), 4000);
    }

    // Timers
    const lemonInterval = setInterval(createLemon, 800);
    const bubbleInterval = setInterval(createBubble, 150);

    setTimeout(() => {
        clearInterval(lemonInterval);
        clearInterval(bubbleInterval);
    }, 5500);
</script>
</body>
</html>
