<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Richman</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFDAC5; 
            font-family: 'Inter', sans-serif;
            color: #333;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* --- LEMONADE LOADING TRANSITION --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFDAC5;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: preloaderFadeOut 0.8s forwards 5.5s !important; 
        }

        .loader-logo-container {
            z-index: 10001;
            pointer-events: none;
        }

        .lemonade-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: rgba(255, 192, 203, 0.7) !important; /* Soft Pink */
            z-index: 10000;
            animation: fillUp 5s ease-in-out forwards 0.3s;
        }

        .lemon-slice {
            position: absolute;
            width: 130px;
            height: 65px; 
            background-color: #fbdc33; 
            border-radius: 130px 130px 0 0; 
            border: 6px solid #f9d71c;
            border-bottom: none;
            z-index: 10001;
            pointer-events: none;
            top: -100px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .lemon-slice::after {
            content: '';
            position: absolute;
            width: 130px;
            height: 130px;
            bottom: -65px;
            border-radius: 50%;
            background: conic-gradient(
                transparent 0deg 42deg, 
                rgba(255, 253, 236, 0.8) 42deg 45deg, 
                transparent 45deg 87deg, 
                rgba(255, 253, 236, 0.8) 87deg 90deg, 
                transparent 90deg 132deg, 
                rgba(255, 253, 236, 0.8) 132deg 135deg, 
                transparent 135deg 177deg, 
                rgba(255, 253, 236, 0.8) 177deg 180deg,
                transparent 180deg
            );
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            z-index: 10002;
            pointer-events: none;
            animation: rise 4s infinite ease-in;
        }

        /* --- ANIMATIONS --- */
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes fallAndFloat {
            0% { transform: translateY(0) rotate(-10deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translateY(85vh) rotate(20deg); }
            60% { transform: translateY(75vh) rotate(10deg); }
            100% { transform: translateY(80vh) rotate(15deg); opacity: 0; }
        }

        @keyframes fillUp {
            0% { height: 0%; }
            100% { height: 100%; }
        }

        @keyframes preloaderFadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- CONTENT STYLES --- */
        .content-left {
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding-left: 10%;
            z-index: 10;
            flex: 1;
        }

        .logo-link {
            text-decoration: none;
            display: inline-block;
            width: fit-content;
        }

        .logo {
            display: flex;
            flex-direction: column;
            text-transform: lowercase;
            line-height: 0.85;
        }

        .first-name {
            font-weight: 800;
            font-size: clamp(4rem, 12vw, 7rem);
            color: #ED4672;
        }

        .last-name {
            font-weight: 400;      
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: #E996AC;       
            letter-spacing: -1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
            display: inline-block;
            transition: color 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        nav a:hover {
            color: #FFB400;
            transform: translateY(-8px) scale(1.1);
        }

        .visual-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            position: relative;
        }

        .flower-cluster {
            position: relative;
            width: 550px; 
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flower {
            position: absolute;
            width: 200px;
            height: 200px;
        }

        .petal {
            position: absolute;
            background: currentColor;
            width: 40%;
            height: 60%;
            top: 50%;
            left: 50%;
            border-radius: 50% 50% 10% 10%;
            transform-origin: top center;
            opacity: 0.8;
        }

        .petal:nth-child(1) { transform: translate(-50%, 0) rotate(0deg); }
        .petal:nth-child(2) { transform: translate(-50%, 0) rotate(72deg); }
        .petal:nth-child(3) { transform: translate(-50%, 0) rotate(144deg); }
        .petal:nth-child(4) { transform: translate(-50%, 0) rotate(216deg); }
        .petal:nth-child(5) { transform: translate(-50%, 0) rotate(288deg); }

        .flower-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 15%;
            height: 15%;
            background: #FFB400;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 180, 0, 0.3);
        }

        .flower-main {
            width: 320px;
            height: 320px;
            animation: pinkToYellowRotate 8s infinite alternate ease-in-out;
            z-index: 2;
        }

        .flower-sub {
            width: 140px;
            height: 140px;
            z-index: 1;
        }

        .flower-top-right { 
            top: -5%; 
            right: -5%; 
            animation: yellowToPinkRotate 7.5s infinite alternate ease-in-out;
        }

        .flower-bottom-left { 
            bottom: -5%; 
            left: -5%; 
            animation: yellowToPinkRotate 9.5s infinite alternate-reverse ease-in-out;
        }

        @keyframes pinkToYellowRotate {
            0% { color: #ED4672; transform: scale(1) rotate(0deg); }
            100% { color: #FFB400; transform: scale(1.05) rotate(12deg); }
        }

        @keyframes yellowToPinkRotate {
            0% { color: #FFB400; transform: scale(1.05) rotate(0deg); }
            100% { color: #ED4672; transform: scale(0.9) rotate(-15deg); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 300;
            text-transform: lowercase;
            opacity: 0.6;
        }

        @media (max-width: 1024px) {
            .flower-cluster { transform: scale(0.8); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; padding-left: 0; align-items: flex-start; text-align: left; overflow-y: auto; }
            .content-left { padding-left: 10%; align-items: flex-start; margin-top: 50px; flex: none; }
            .visual-right { height: 450px; width: 100%; flex: none; }
            .flower-cluster { width: 320px; height: 320px; transform: scale(1); align-self: center; } 
            .flower-main { width: 180px; height: 180px; }
            .flower-sub { width: 80px; height: 80px; }
            footer { position: relative; bottom: 20px; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-logo-container">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </div>
        <div class="lemonade-fill"></div>
    </div>

    <div class="content-left">
        <a href="index.html" class="logo-link">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </a>

        <nav>
            <ul>
                <li><a href="about.html">about.</a></li>
                <li><a href="contact.html">contact.</a></li>
                <li><a href="blog.html">blog.</a></li>
            </ul>
        </nav>
    </div>

    <div class="visual-right">
        <div class="flower-cluster">
            <div class="flower flower-sub flower-top-right">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="flower-center"></div>
            </div>

            <div class="flower flower-main">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="flower-center"></div>
            </div>

            <div class="flower flower-sub flower-bottom-left">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="flower-center"></div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026-present anna richman
    </footer>

    <script>
    const loader = document.getElementById('loader-wrapper');

    function createLemon() {
        if (!loader || getComputedStyle(loader).opacity === "0") return;
        const lemon = document.createElement('div');
        lemon.classList.add('lemon-slice');
        lemon.style.left = Math.random() * 90 + "vw";
        const duration = Math.random() * 2 + 3; 
        lemon.style.animation = `fallAndFloat ${duration}s ease-in-out forwards`;
        loader.appendChild(lemon);
        setTimeout(() => lemon.remove(), duration * 1000);
    }

    function createBubble() {
        if (!loader || getComputedStyle(loader).opacity === "0") return;
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        const size = Math.random() * 10 + 5 + "px";
        bubble.style.width = size;
        bubble.style.height = size;
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.animationDuration = Math.random() * 2 + 2 + "s";
        loader.appendChild(bubble);
        setTimeout(() => bubble.remove(), 4000);
    }

    const lemonInterval = setInterval(createLemon, 800);
    const bubbleInterval = setInterval(createBubble, 150);

    setTimeout(() => {
        clearInterval(lemonInterval);
        clearInterval(bubbleInterval);
    }, 5500);
</script>

</body>
</html>
