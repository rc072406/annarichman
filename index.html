<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Richman</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFDAC5; 
            font-family: 'Inter', sans-serif;
            color: #333;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* --- LEMONADE LOADING TRANSITION --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFDAC5;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: preloaderFadeOut 0.8s forwards 5.5s !important; 
        }

        .loader-logo-container {
            z-index: 10001;
            pointer-events: none;
        }

        .lemonade-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            /* FIX: Set height to 100% and animate scale instead */
            height: 100%;
            background-color: rgba(255, 192, 203, 0.7) !important;
            z-index: 10000;
            transform-origin: bottom;
            transform: scaleY(0);
            animation: fillUp 5s ease-in-out forwards 0.3s;
            will-change: transform;
        }

        /* --- ANIMATIONS --- */
        @keyframes fillUp {
            0% { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }

        /* replace with original */
        .lemon-slice {
            position: absolute;
            width: 120px;
            height: 60px; 
            border-radius: 120px 120px 0 0; 
            border: 5px solid #fffdf0; 
            border-bottom: 2px solid #f9d71c;
            z-index: 10001;
            pointer-events: none;
            top: -100px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1), inset 0 -2px 5px rgba(0,0,0,0.05);
            background: radial-gradient(circle at 50% 100%, #fff9c4 20%, #f9d71c 100%);
            will-change: transform;
        }

        .lemon-slice::after {
            content: '';
            position: absolute;
            width: 110px; 
            height: 110px;
            bottom: -55px; 
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            background: conic-gradient(
                from -90deg,
                #fce862 0deg 40deg,
                #fffdf0 40deg 45deg,
                #fce862 45deg 85deg,
                #fffdf0 85deg 90deg,
                #fce862 90deg 130deg,
                #fffdf0 130deg 135deg,
                #fce862 135deg 175deg,
                #fffdf0 175deg 180deg,
                transparent 180deg
            );
        }

        .lemon-slice::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 20px;
            width: 30px;
            height: 10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(2px);
            z-index: 10002;
            transform: rotate(-20deg);
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            z-index: 10002;
            pointer-events: none;
            animation: rise 4s infinite ease-in;
            will-change: transform;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes fallAndFloat {
            0% { transform: translateY(0) rotate(-10deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translateY(85vh) rotate(20deg); }
            60% { transform: translateY(75vh) rotate(10deg); }
            100% { transform: translateY(80vh) rotate(15deg); opacity: 0; }
        }

        @keyframes preloaderFadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- CONTENT STYLES --- */
        .content-left {
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding-left: 10%;
            z-index: 10;
            flex: 1;
        }

        .logo-link {
            text-decoration: none;
            display: inline-block;
            width: fit-content;
        }

        .logo {
            display: flex;
            flex-direction: column;
            text-transform: lowercase;
            line-height: 0.85;
        }

        .first-name {
            font-weight: 800;
            font-size: clamp(4rem, 12vw, 7rem);
            color: #ED4672;
        }

        .last-name {
            font-weight: 400;      
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: #E996AC;          
            letter-spacing: -1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
            display: inline-block;
            transition: color 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        nav a:hover {
            color: #FFB400;
            transform: translateY(-8px) scale(1.1);
        }

        .visual-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            position: relative;
        }

        .flower-cluster {
            position: relative;
            width: 550px; 
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flower {
            position: absolute;
            width: 200px;
            height: 200px;
            /* Layer promotion fix */
            transform: translateZ(0);
            will-change: transform;
        }

        .petal {
            position: absolute;
            background: currentColor;
            width: 70%;
            height: 85%;
            top: 50%;
            left: 50%;
            border-radius: 45% 55% 25% 25% / 75% 85% 25% 15%;
            transform-origin: 0% 0%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(139, 0, 0, 0.4) 10%, transparent 60%),
                radial-gradient(circle at 10% 10%, rgba(255,255,255,0.25) 0%, currentColor 85%),
                repeating-radial-gradient(circle at 0% 0%, transparent 0, transparent 4px, rgba(0,0,0,0.03) 5px);
            filter: drop-shadow(6px 6px 12px rgba(0,0,0,0.15)) contrast(1.1);
            backdrop-filter: blur(1px);
        }

        .petal:nth-child(1) { transform: rotate(5deg) translate(-8%, -15%); }
        .petal:nth-child(2) { transform: rotate(78deg) translate(-8%, -15%); }
        .petal:nth-child(3) { transform: rotate(150deg) translate(-8%, -15%); }
        .petal:nth-child(4) { transform: rotate(220deg) translate(-8%, -15%); }
        .petal:nth-child(5) { transform: rotate(295deg) translate(-8%, -15%); }

        .flower-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22%;
            height: 22%;
            background: radial-gradient(circle, #5e0000 0%, #8B0000 40%, #ED4672 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .flower-center::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 70px;
            background: linear-gradient(to top, #8B0000, #ED4672, #FFD700);
            bottom: 25%;
            left: 50%;
            transform-origin: bottom center;
            transform: rotate(20deg);
            border-radius: 5px;
            box-shadow: 2px 5px 5px rgba(0,0,0,0.2);
        }

        .flower-center::before {
            content: '...';
            position: absolute;
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
            top: -65px;
            left: 18px;
            transform: rotate(110deg);
            text-shadow: 1px 1px 1px rgba(0,0,0,0.4), 0 0 5px #fff700;
            letter-spacing: 1px;
        }

        .flower-main {
            width: 320px;
            height: 320px;
            animation: pinkToYellowRotate 8s infinite alternate ease-in-out;
            z-index: 2;
        }

        .flower-sub {
            width: 140px;
            height: 140px;
            z-index: 1;
        }

        .flower-top-right { 
            top: -5%; 
            right: -5%; 
            animation: yellowToPinkRotate 7.5s infinite alternate ease-in-out;
        }

        .flower-bottom-left { 
            bottom: -5%; 
            left: -5%; 
            animation: yellowToPinkRotate 9.5s infinite alternate-reverse ease-in-out;
        }

        @keyframes pinkToYellowRotate {
            0% { color: #ED4672; transform: scale(1) rotate(0deg); }
            100% { color: #FFB400; transform: scale(1.05) rotate(12deg); }
        }

        @keyframes yellowToPinkRotate {
            0% { color: #FFB400; transform: scale(1.05) rotate(0deg); }
            100% { color: #ED4672; transform: scale(0.9) rotate(-15deg); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 300;
            text-transform: lowercase;
            opacity: 0.6;
        }

        @media (max-width: 1024px) {
            .flower-cluster { transform: scale(0.8); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; padding-left: 0; align-items: flex-start; text-align: left; overflow-y: auto; }
            .content-left { padding-left: 10%; align-items: flex-start; margin-top: 50px; flex: none; }
            .visual-right { height: 450px; width: 100%; flex: none; }
            .flower-cluster { width: 320px; height: 320px; transform: scale(1); align-self: center; } 
            .flower-main { width: 180px; height: 180px; }
            .flower-sub { width: 80px; height: 80px; }
            footer { position: relative; bottom: 20px; margin-top: 20px; }
        }

        .cursor-petal {
            position: fixed;
            top: 0;
            left: 0;
            width: 18px;
            height: 24px;
            border-radius: 40% 60% 45% 55% / 40% 40% 60% 60%;
            pointer-events: none;
            z-index: 10005;
            opacity: 0.9;
            transform-origin: center;
            background: radial-gradient(circle at 0% 50%, #FFD700 0%, #FFFDF0 60%);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.05), 2px 2px 5px rgba(0,0,0,0.1);
            filter: contrast(1.1);
            will-change: transform, opacity;
        }

        @keyframes fallAndFade {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 0.9;
            }
            100% {
                transform: translate(var(--tw-x), var(--tw-y)) rotate(var(--tw-r)) scale(0.4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-logo-container">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </div>
        <div class="lemonade-fill"></div>
    </div>

    <div class="content-left">
        <a href="index.html" class="logo-link">
            <div class="logo">
                <span class="first-name">anna</span>
                <span class="last-name">richman</span>
            </div>
        </a>

        <nav>
            <ul>
                <li><a href="about.html">about.</a></li>
                <li><a href="contact.html">contact.</a></li>
                <li><a href="blog.html">blog.</a></li>
            </ul>
        </nav>
    </div>

    <div class="visual-right">
        <div class="flower-cluster">
            <div class="flower flower-sub flower-top-right">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="flower-center"></div>
            </div>

            <div class="flower flower-main">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="flower-center"></div>
            </div>

            <div class="flower flower-sub flower-bottom-left">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="flower-center"></div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026-present anna richman
    </footer>

    <script>
    const loader = document.getElementById('loader-wrapper');

    function createLemon() {
        if (!loader || getComputedStyle(loader).opacity === "0" || getComputedStyle(loader).visibility === "hidden") return;
        const lemon = document.createElement('div');
        lemon.classList.add('lemon-slice');
        lemon.style.left = Math.random() * 90 + "vw";
        const duration = Math.random() * 2 + 3; 
        lemon.style.animation = `fallAndFloat ${duration}s ease-in-out forwards`;
        loader.appendChild(lemon);
        setTimeout(() => lemon.remove(), duration * 1000);
    }

    function createBubble() {
        if (!loader || getComputedStyle(loader).opacity === "0" || getComputedStyle(loader).visibility === "hidden") return;
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        const size = Math.random() * 8 + 4 + "px";
        bubble.style.width = size;
        bubble.style.height = size;
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.animationDuration = Math.random() * 2 + 2 + "s";
        loader.appendChild(bubble);
        setTimeout(() => bubble.remove(), 4000);
    }

    const lemonInterval = setInterval(createLemon, 900); 
    const bubbleInterval = setInterval(createBubble, 250); 

    setTimeout(() => {
        clearInterval(lemonInterval);
        clearInterval(bubbleInterval);
    }, 5200); 

    /* THROTTLED PETAL CURSOR */
    let isThrottled = false;
    document.addEventListener('mousemove', function(e) {
        if (isThrottled || Math.random() > 0.15) return; 

        isThrottled = true;
        setTimeout(() => isThrottled = false, 50); 

        const petal = document.createElement('div');
        petal.className = 'cursor-petal';
        petal.style.left = e.clientX + 'px';
        petal.style.top = e.clientY + 'px';

        const fallX = (Math.random() - 0.5) * 120 + 'px';
        const fallY = (Math.random() * 150 + 80) + 'px';
        const rotation = (Math.random() * 720 - 360) + 'deg';
        
        petal.style.setProperty('--tw-x', fallX);
        petal.style.setProperty('--tw-y', fallY);
        petal.style.setProperty('--tw-r', rotation);

        const scale = 0.8 + Math.random() * 0.5;
        petal.style.transform = `scale(${scale})`;
        petal.style.animation = 'fallAndFade 2s ease-out forwards';

        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 2000);
    });
    </script>
</body>
</html>
